

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет — Lyez</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-page {
            min-height: 100vh;
            padding-top: 100px;
            padding-bottom: 60px;
        }

        .profile-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .profile-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }

        .profile-info h2 {
            color: #fff;
            font-size: 20px;
        }

        .profile-info p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .status-section h3 {
            color: #fff;
            margin-bottom: 16px;
        }

        .status-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .status-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .status-badge.active {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        .status-badge.inactive {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        .profile-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .profile-actions .btn {
            flex: 1;
            min-width: 140px;
        }

        .loading {
            text-align: center;
            color: var(--text-muted);
            padding: 60px 0;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="/" class="logo">LYEZ</a>
            <nav class="nav">
                <a href="/#features">Возможности</a>
                <a href="/#pricing">Цены</a>
                <a href="/#download">Скачать</a>
            </nav>
            <button class="btn btn-ghost" id="logoutBtn">Выйти</button>
        </div>
    </header>

    <div class="profile-page">
        <div class="container">
            <div class="profile-card" id="profileCard">
                <!-- Будет заполняться через JS -->
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <scriptsrc="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Загрузка данных профиля
        document.addEventListener('DOMContentLoaded', async () => {
            const card = document.getElementById('profileCard');

            auth.onAuthStateChanged(async (user) => {
                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }

                // Получаем данные из Firestore
                const doc = await db.collection('users').doc(user.uid).get();
                const data = doc.data() || {};

                card.innerHTML = `
                    <div class="profile-header">
                        <div class="profile-avatar">${data.name ? data.name[0].toUpperCase() : 'U'}</div>
                        <div class="profile-info">
                            <h2>${data.name || 'Пользователь'}</h2>
                            <p>${user.email}</p>
                        </div>
                    </div>
                    <div class="status-section">
                        <h3>Статус подписки</h3>
                        <div class="status-card">
                            <div>
                                <strong style="color:#fff">Премиум</strong>
                                <p style="color:var(--text-muted);font-size:13px;margin-top:4px">
                                    ${data.subscription === 'premium' ? 'Активна' : 'Не активна'}
                                </p>
                            </div>
                            <span class="status-badge ${data.subscription === 'premium' ? 'active' : 'inactive'}">
                                ${data.subscription === 'premium' ? '✅ Активна' : '❌ Не активна'}
                            </span>
                        </div>
                        ${data.subscription === 'premium'
                            ? `<div class="profile-actions">
                                <a href="#" class="btn btn-primary" id="dlPremiumProfile">Скачать премиум .exe</a>
                               </div>`
                            : `<div class="profile-actions">
                                <a href="/#pricing" class="btn btn-primary">Купить премиум</a>
                                <a href="/#download" class="btn btn-outline">Скачать бесплатно</a>
                               </div>`
                        }
                    </div>
                `;

                // Кнопка скачивания премиума
                const dlBtn = document.getElementById('dlPremiumProfile');
                if (dlBtn) {
                    dlBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        // Ссылка на файл — замени на свою
                        alert('Ссылка на скачивание: https://your-site.com/lyez_premium.exe');
                    });
                }
            });
        });
    </script>
</body>
</html>
