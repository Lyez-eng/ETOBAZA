

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Lyez</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 70px;
        }
        .auth-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 48px 40px;
            max-width: 400px;
            width: 90%;
        }
        .auth-box h1 { margin-bottom: 8px; }
        .auth-box .sub { color: var(--text-muted); margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg);
            color: #fff;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .error-msg {
            color: var(--danger);
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
        }
        .auth-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .auth-link a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-box">
            <h1>Регистрация</h1>
            <p class="sub">Создайте аккаунт</p>
            <div class="error-msg" id="errorMsg"></div>
            <form id="registerForm">
                <div class="form-group">
                    <label>Имя (ник)</label>
                    <input type="text" id="regName" placeholder="Ваш ник" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" placeholder="••••••••" minlength="6" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Создать аккаунт</button>
            </form>
            <p class="auth-link">Уже есть аккаунт? <a href="login.html">Войти</a></p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
